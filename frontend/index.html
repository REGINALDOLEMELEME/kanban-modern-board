<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Moderno</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="topbar">
        <div class="brand-block">
            <p class="brand-kicker">Kanban</p>
            <div class="board-name-row">
                <input id="board-name-input" class="board-name-input" type="text" maxlength="255" aria-label="Nome do quadro" />
                <button id="export-pdf-btn" class="board-name-btn board-name-btn-secondary">Exportar PDF</button>
            </div>
            <p class="board-name-hint">Pressione Enter ou clique fora do campo para salvar o nome.</p>
        </div>
        <div id="due-alerts" class="due-alerts hidden" aria-live="assertive"></div>
    </header>

    <main class="board" id="board" aria-live="polite">
        <!-- Columns will be injected here by JavaScript -->
    </main>

    <template id="column-template">
        <section class="column" data-id="">
            <div class="column-header">
                <h2 class="column-title"></h2>
            </div>
            <div class="card-list"></div>
            <div class="add-card-container">
                <button class="add-card-btn">+ Novo card</button>
                <div class="add-card-form hidden">
                    <input class="new-card-title-input" type="text" placeholder="Titulo" />
                    <input class="new-card-subject-input" type="text" placeholder="Assunto" />
                    <label class="new-card-priority-label">Prazo</label>
                    <input class="new-card-due-date-input" type="date" />
                    <textarea class="new-card-notes-input" placeholder="Observacoes"></textarea>
                    <textarea class="new-card-actions-input" placeholder="Acoes (uma por linha)"></textarea>
                    <label class="new-card-priority-label">Prioridade</label>
                    <select class="new-card-priority-input">
                        <option value="normal">Normal</option>
                        <option value="ponderado">Ponderado</option>
                        <option value="urgente">Urgente</option>
                    </select>
                    <div class="add-card-actions">
                        <button class="save-card-btn">Criar card</button>
                        <button class="cancel-card-btn" aria-label="Cancelar">X</button>
                    </div>
                </div>
            </div>
        </section>
    </template>

            <template id="card-template">
        <article class="card" draggable="true" data-id="">
            <div class="card-main">
                <div class="card-topline">
                    <h3 class="card-title"></h3>
                    <div class="card-chip-row">
                        <span class="blocked-chip hidden">Bloqueado</span>
                        <span class="priority-chip"></span>
                    </div>
                </div>
                <p class="card-subject hidden"></p>
                <p class="card-deadline hidden"></p>
                <p class="card-blocked-reason hidden"></p>
                <p class="card-blocked-until hidden"></p>
                <div class="card-progress hidden"></div>
                <div class="card-actions-list"></div>
                <p class="card-notes hidden"></p>
            </div>
            <button class="edit-card-btn" aria-label="Editar card">✎</button>
            <button class="delete-card-btn" aria-label="Remover card">&times;</button>
        </article>
    </template>

    <div id="blocked-modal" class="blocked-modal hidden" role="dialog" aria-modal="true" aria-labelledby="blocked-modal-title">
        <div class="blocked-modal-panel">
            <h3 id="blocked-modal-title">Detalhes do bloqueio</h3>
            <p class="blocked-modal-hint">Este card foi movido para Blocked. Informe o motivo e a data prevista para conclusão.</p>
            <label class="new-card-priority-label" for="blocked-reason-input">O que está bloqueando?</label>
            <textarea id="blocked-reason-input" class="blocked-modal-input" placeholder="Descreva o bloqueio"></textarea>
            <label class="new-card-priority-label" for="blocked-until-input">Data prevista de conclusão</label>
            <input id="blocked-until-input" class="blocked-modal-input" type="date" />
            <div class="blocked-modal-actions">
                <button id="blocked-save-btn" class="save-card-btn">Salvar bloqueio</button>
                <button id="blocked-cancel-btn" class="cancel-card-btn" aria-label="Cancelar">X</button>
            </div>
        </div>
    </div>

    <div id="edit-card-modal" class="blocked-modal hidden" role="dialog" aria-modal="true" aria-labelledby="edit-card-modal-title">
        <div class="blocked-modal-panel">
            <h3 id="edit-card-modal-title">Editar card</h3>
            <label class="new-card-priority-label" for="edit-title-input">Titulo</label>
            <input id="edit-title-input" class="blocked-modal-input" type="text" />
            <label class="new-card-priority-label" for="edit-subject-input">Assunto</label>
            <input id="edit-subject-input" class="blocked-modal-input" type="text" />
            <label class="new-card-priority-label" for="edit-due-date-input">Prazo</label>
            <input id="edit-due-date-input" class="blocked-modal-input" type="date" />
            <label class="new-card-priority-label" for="edit-notes-input">Observacoes</label>
            <textarea id="edit-notes-input" class="blocked-modal-input" placeholder="Observacoes"></textarea>
            <label class="new-card-priority-label" for="edit-actions-input">Acoes (uma por linha)</label>
            <textarea id="edit-actions-input" class="blocked-modal-input" placeholder="Acoes (uma por linha)"></textarea>
            <label class="new-card-priority-label" for="edit-priority-input">Prioridade</label>
            <select id="edit-priority-input" class="blocked-modal-input">
                <option value="normal">Normal</option>
                <option value="ponderado">Ponderado</option>
                <option value="urgente">Urgente</option>
            </select>
            <div id="edit-blocked-section" class="hidden">
                <label class="new-card-priority-label" for="edit-blocked-reason-input">O que está bloqueando?</label>
                <textarea id="edit-blocked-reason-input" class="blocked-modal-input" placeholder="Descreva o bloqueio"></textarea>
                <label class="new-card-priority-label" for="edit-blocked-until-input">Data prevista de conclusão</label>
                <input id="edit-blocked-until-input" class="blocked-modal-input" type="date" />
            </div>
            <div class="blocked-modal-actions">
                <button id="edit-card-save-btn" class="save-card-btn">Salvar alterações</button>
                <button id="edit-card-cancel-btn" class="cancel-card-btn" aria-label="Cancelar">X</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
